<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KoKrŠNeK">
<meta name="theme-color" content="#050505">
<link rel="manifest" href="manifest.json">
<title>KoKrŠNeK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --card:#0B0B0B;
    --line:#1A3A5C;
    --ink:#E8F4FF;
    --muted:#7AAFD4;
    --accent:#4DB8FF;
    --accent-soft:rgba(77,184,255,0.12);
    --past:#5A8FAD;
    --past-soft:#050D12;
    --link:#7ECDFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background-color:var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    overscroll-behavior-y: none;
  }
  .app{
    height:100vh;
    width:100%;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    position:relative;
    padding-bottom:160px;
    scroll-padding-bottom:160px;
    box-sizing:border-box;
  }
  .search-btn{
    position:fixed;
    bottom:110px; right:18px;
    top:auto;
    z-index:20;
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(11,11,11,0.7);
    border:1px solid rgba(26,163,255,0.45);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    pointer-events:auto;
  }
  #gearBtn{
    right:64px;
  }
  #gearBtn.connected{
    border-color:rgba(26,163,255,0.9);
    background:rgba(14,95,168,0.25);
  }
  .search-btn svg{
    width:18px; height:18px;
    stroke:var(--accent);
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
  }

  .search-overlay{
    position:fixed;
    bottom:0; left:0; right:0;
    top:auto;
    width:100%;
    box-sizing:border-box;
    z-index:40;
    background:rgba(5,5,5,0.97);
    backdrop-filter:blur(4px);
    border-top:1px solid rgba(26,163,255,0.3);
    display:flex;
    flex-direction:column;
    padding:18px 18px 32px;
    max-height:75vh;
    transform:translateY(100%);
    transition:transform .2s ease;
  }
  .search-overlay.open{ transform:translateY(0); }

  .config-overlay{
    position:fixed;
    inset:0;
    z-index:40;
    background:rgba(0,0,0,0.94);
    backdrop-filter:blur(2px);
    display:flex;
    flex-direction:column;
    padding:22px 20px;
    transform:translateY(-100%);
    transition:transform .15s ease;
  }
  .config-overlay.open{ transform:translateY(0); }
  .config-title{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:18px;
  }
  .config-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:5px;
  }
  .config-input{
    width:100%;
    background:#0B0B0B;
    border:1px solid rgba(26,163,255,0.4);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:10px 12px;
    border-radius:4px;
    outline:none;
    margin-bottom:14px;
    box-sizing:border-box;
  }
  .config-input:focus{ border-color:rgba(26,163,255,0.9); }
  .config-status{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    margin:8px 0 14px;
    min-height:18px;
  }
  .config-status.ok{ color:#1AA3FF; }
  .config-status.err{ color:#FF4444; }
  .config-btns{
    display:flex; gap:10px; margin-top:4px;
  }

  .search-row{
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px;
  }
  .search-row input[type="text"]{
    flex:1;
    background:#0B0B0B;
    border:1px solid rgba(26,163,255,0.4);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    padding:11px 12px;
    border-radius:4px;
    outline:none;
  }
  .search-row input[type="text"]::placeholder{ color:var(--muted); }
  .search-close{
    width:38px; height:38px;
    border-radius:50%;
    background:transparent;
    border:1px solid rgba(26,163,255,0.4);
    color:var(--accent);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
  }

  .date-row-search{
    display:flex; align-items:center; gap:10px;
    margin-bottom:18px;
  }
  .date-row-search input[type="date"]{
    flex:1;
    background:#0B0B0B;
    border:1px solid rgba(26,163,255,0.4);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    padding:9px 10px;
    border-radius:4px;
    outline:none;
    color-scheme:dark;
  }
  .cal-btn{
    flex-shrink:0;
    background:var(--accent);
    color:#000;
    border:none;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:9px 12px;
    border-radius:4px;
    cursor:pointer;
    text-decoration:none;
    white-space:nowrap;
  }

  .search-results{
    flex:1;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:8px;
    padding-bottom:24px;
  }
  .result-item{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    border:1px solid rgba(26,163,255,0.22);
    border-radius:4px;
    padding:10px 12px;
    cursor:pointer;
  }
  .result-item:active{ background:rgba(26,163,255,0.08); }
  .result-main{ flex:1; min-width:0; }
  .result-title{
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .result-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  .map-pin{
    flex-shrink:0;
    width:30px; height:30px;
    border-radius:50%;
    border:1px solid rgba(26,163,255,0.4);
    display:flex; align-items:center; justify-content:center;
  }
  .map-pin svg{ width:14px; height:14px; stroke:var(--accent); fill:none; stroke-width:2; }
  .no-results{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    text-align:center;
    margin-top:24px;
  }

  .topbar{
    position:fixed;
    top:auto !important;
    bottom:0; left:0; right:0;
    padding:10px 16px 28px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    z-index:5;
    background:linear-gradient(transparent, var(--bg) 50%);
    pointer-events:none;
  }
  .topbar .label{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:clamp(18px, 6.5vw, 36px);
    letter-spacing:0.04em;
    color:var(--accent);
    text-transform:uppercase;
    width:100%;
    max-width:100%;
    text-align:center;
    white-space:nowrap;
  }
  .topbar .today{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .topbar .nameday{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
    color:var(--muted);
  }

  .slot{
    height:33.34dvh;
    min-height:180px;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    scroll-snap-align:center;
    scroll-snap-stop:always;
    position:relative;
    padding:8px 26px;
    box-sizing:border-box;
  }

  .dot{
    position:absolute;
    left:50%; top:50%;
    width:9px; height:9px;
    border-radius:50%;
    background:var(--line);
    transform:translate(-50%,-50%);
    z-index:1;
  }

  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:380px;
    transition:opacity .25s ease, transform .25s ease;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:5px;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .eyebrow .pip{
    width:5px; height:5px;
    background:var(--muted);
    display:inline-block;
  }

  .date-row{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    color:var(--ink);
    line-height:1.05;
    margin:0 0 1px;
  }
  .time-row{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    margin-bottom:4px;
    letter-spacing:0.04em;
  }
  .title-row{
    font-family:'JetBrains Mono', monospace;
    font-size:30px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0 0 4px;
    line-height:1.15;
  }
  .place-row{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:2px;
  }
  .place-row::before{ content:"-= "; }
  .place-row::after{ content:" =-"; }

  /* --- NOW (center, dominant) --- */
  .slot.now .card{
    background:linear-gradient(180deg, rgba(26,163,255,0.05), rgba(0,0,0,0));
    border:1px solid rgba(26,163,255,0.45);
    border-radius:2px;
    padding:16px 20px 14px;
    position:relative;
    text-align:center;
  }
  .slot.now .card::before,
  .slot.now .card::after{
    content:"";
    position:absolute;
    width:10px; height:10px;
    border:1.5px solid var(--accent);
  }
  .slot.now .card::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .slot.now .card::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .slot.now .eyebrow{ color:var(--accent); justify-content:center; }
  .slot.now .eyebrow .pip{ background:var(--accent); box-shadow:0 0 6px var(--accent); }
  .slot.now .date-row{ font-size:22px; }
  .slot.now .title-row{
    font-size:32px;
    font-weight:700;
    color:var(--ink);
    border-bottom:2px solid var(--accent);
    display:inline-block;
    padding-bottom:2px;
  }
  .slot.now .badge{
    display:inline-block;
    margin-top:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#000;
    background:var(--accent);
    padding:3px 9px;
    box-shadow:0 0 10px rgba(26,163,255,0.6);
  }

  /* --- FUTURE (above now) --- */
  .slot.future .card{
    text-align:center;
  }
  .slot.future .date-row{ font-size:22px; }
  .slot.future .title-row{ font-size:32px; font-weight:700; color:var(--ink); }
  .slot.future .eyebrow{ justify-content:center; color:var(--accent); }
  .slot.future .eyebrow .pip{ background:var(--accent); }

  /* --- PAST (below now, with photo link) --- */
  .slot.past .card{
    text-align:center;
  }
  .slot.past .date-row{ font-size:22px; }
  .slot.past .title-row{ font-size:32px; font-weight:700; color:var(--ink); }
  .slot.past .eyebrow{ justify-content:center; color:var(--accent); }
  .slot.past .eyebrow .pip{ background:var(--accent); }

  .photo-link{
    margin-top:9px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--link);
    background:var(--past-soft);
    border:1px solid rgba(26,163,255,0.3);
    padding:6px 12px;
    text-decoration:none;
    transition:background .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .photo-link:active{ transform:scale(0.97); background:#071A26; box-shadow:0 0 10px rgba(26,163,255,0.4); }
  .photo-link svg{ width:13px; height:13px; flex-shrink:0; }

  .ev-modal-backdrop{
    position:fixed; inset:0; z-index:60;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .ev-modal{
    background:#0F1117;
    border:1px solid rgba(26,163,255,0.4);
    border-radius:12px;
    width:100%; max-width:400px;
    max-height:80vh;
    overflow-y:auto;
    padding:24px 22px 20px;
    position:relative;
    animation: popIn .25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ev-modal-close{
    position:absolute; top:12px; right:14px;
    background:none; border:none; color:var(--muted);
    font-size:22px; cursor:pointer; line-height:1;
    padding:2px 6px;
  }
  .ev-modal-close:hover{ color:var(--ink); }
  .ev-modal-label{
    font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:3px; margin-top:14px;
    font-family:'JetBrains Mono',monospace;
  }
  .ev-modal-label:first-child{ margin-top:0; }
  .ev-modal-value{
    font-family:'JetBrains Mono',monospace;
    font-size:14px; color:var(--ink); line-height:1.5;
    word-break:break-word;
  }
  .ev-modal-title{
    font-family:'JetBrains Mono',monospace;
    font-size:20px; font-weight:700; color:var(--ink);
    margin-bottom:16px; line-height:1.3; padding-right:28px;
  }
  .ev-modal-link{
    display:inline-flex; align-items:center; gap:6px;
    color:var(--link); font-size:13px;
    font-family:'JetBrains Mono',monospace;
    text-decoration:none;
    border:1px solid rgba(26,163,255,0.3);
    padding:5px 12px; border-radius:100px; margin-top:4px;
  }
  .title-clickable{
    cursor:pointer; border-bottom:1px dashed rgba(26,163,255,0.4);
    transition:border-color .15s;
  }
  .title-clickable:hover{ border-color:var(--accent); }

  @keyframes slideDown{
    from{ transform:translateY(-20px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  @keyframes popIn{
    from{ transform:translate(-50%,-50%) scale(0.5); opacity:0; }
    to{ transform:translate(-50%,-50%) scale(1); opacity:1; }
  }
  @media (prefers-reduced-motion: reduce){
    .hint .arrow{ animation:none; }
  }
</style>
</head>
<body>

<button class="search-btn" id="homeBtn" aria-label="Přejít na aktuální událost" style="right:auto;left:18px;" onclick="
  var app=document.getElementById('app');
  var now=app.querySelector('.slot.now');
  if(!now) return;
  var top=0;
  var el=now;
  while(el && el!==app){top+=el.offsetTop;el=el.offsetParent;}
  var offset=top-(app.clientHeight/2)+(now.offsetHeight/2);
  app.scrollTo({top:Math.max(0,offset),behavior:'smooth'});
">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
    <path d="M9 21V12h6v9"/>
  </svg>
</button>

<button class="search-btn" id="searchBtn" aria-label="Hledat">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.3-4.3"/></svg>
</button>

<div class="search-overlay" id="searchOverlay">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Hledat podle názvu nebo místa…" autocomplete="off">
    <button class="search-close" id="searchClose" aria-label="Zavřít">×</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<div class="topbar">
  <span class="label">KoKrŠNeK - tak život chode</span>
  <span class="today" id="todayLabel"></span>
  <span class="nameday" id="namedayLabel"></span>
</div>

<div id="calStatus" style="display:none;position:fixed;bottom:20px;left:16px;right:16px;z-index:30;background:#0B0B0B;border:1px solid rgba(255,80,80,0.5);color:#FF6060;font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border-radius:4px;"></div>

<div class="app" id="app">
</div>

<script>
const MONTHS = ["led","úno","bře","dub","kvě","čvn","čvc","srp","zář","říj","lis","pro"];
const DAYS = ["ne","po","út","st","čt","pá","so"];

function fmtDate(d){
  return `${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtFull(d){
  return `${DAYS[d.getDay()]} ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtTime(d, end){
  const t = (x)=> x.getHours().toString().padStart(2,'0')+":"+x.getMinutes().toString().padStart(2,'0');
  return end ? `${t(d)} – ${t(end)}` : t(d);
}

function isMultiDay(ev){
  const startDay = new Date(ev.start.getFullYear(), ev.start.getMonth(), ev.start.getDate());
  const endDay   = new Date(ev.end.getFullYear(),   ev.end.getMonth(),   ev.end.getDate());
  return endDay - startDay >= 86400000;
}

function fmtDateRange(ev){
  if(!isMultiDay(ev)) return fmtDate(ev.start);
  const endDisplay = new Date(ev.end.getTime() - 1);
  if(ev.start.getMonth() === endDisplay.getMonth() && ev.start.getFullYear() === endDisplay.getFullYear())
    return `${ev.start.getDate()}. – ${endDisplay.getDate()}. ${MONTHS[endDisplay.getMonth()]} ${endDisplay.getFullYear()}`;
  return `${fmtDate(ev.start)} – ${fmtDate(endDisplay)}`;
}

function fmtTimeRow(ev){
  if(isMultiDay(ev)){
    const endDisplay = new Date(ev.end.getTime() - 1);
    return `${fmtFull(ev.start)} – ${fmtFull(endDisplay)}`;
  }
  return fmtTime(ev.start, ev.end);
}
// =====================================================
// HESLO PRO PŘÍSTUP K FOTOALBŮM — otázka + odpověď
const ALBUM_QUESTION = "Jaká je přezdívka šerifa?";
const ALBUM_ANSWER   = "šuraj"; // porovnává se case-insensitive
// =====================================================

function checkAlbumAccess(url){
  const saved = sessionStorage.getItem('albumAccess');
  if(saved === 'ok'){
    window.open(url, '_blank');
    return;
  }

  const backdrop = document.createElement('div');
  backdrop.className = 'ev-modal-backdrop';
  backdrop.onclick = (e) => { if(e.target===backdrop) backdrop.remove(); };
  backdrop.innerHTML = `
    <div class="ev-modal" style="text-align:center;">
      <button class="ev-modal-close" onclick="this.closest('.ev-modal-backdrop').remove()">×</button>
      <div class="ev-modal-title" style="margin-bottom:6px;">🔒 Fotoalbum</div>
      <div class="ev-modal-label" style="margin-bottom:12px;font-size:14px;">${ALBUM_QUESTION}</div>
      <input id="albumPwdInput" type="text" placeholder="Tvoje odpověď…" style="
        width:100%; box-sizing:border-box;
        background:#0B0B0B; border:1px solid rgba(26,163,255,0.4);
        color:var(--ink); font-family:'JetBrains Mono',monospace;
        font-size:16px; padding:10px 12px; border-radius:4px; outline:none;
        margin-bottom:8px;
      ">
      <div id="albumPwdErr" style="color:#FF6060;font-size:12px;font-family:'JetBrains Mono',monospace;min-height:18px;margin-bottom:8px;"></div>
      <button onclick="
        var ans=document.getElementById('albumPwdInput').value.trim().toLowerCase();
        var err=document.getElementById('albumPwdErr');
        if(ans==='${ALBUM_ANSWER}'){
          sessionStorage.setItem('albumAccess','ok');
          this.closest('.ev-modal-backdrop').remove();
          window.open('${url}','_blank');
        } else {
          err.textContent='Špatná odpověď, zkus to znovu.';
          document.getElementById('albumPwdInput').value='';
          document.getElementById('albumPwdInput').focus();
        }
      " style="
        background:var(--accent); border:none; color:#000;
        font-family:'JetBrains Mono',monospace; font-size:13px;
        padding:10px 28px; border-radius:6px; cursor:pointer; font-weight:700; width:100%;
      ">Otevřít album</button>
    </div>
  `;
  document.body.appendChild(backdrop);
  setTimeout(() => document.getElementById('albumPwdInput')?.focus(), 100);
}

const now = new Date();

function at(daysOffset, h, m, durMin){
  const d = new Date(now);
  d.setDate(d.getDate()+daysOffset);
  d.setHours(h, m, 0, 0);
  const end = new Date(d.getTime() + durMin*60000);
  return {start:d, end};
}

function fmtRelativeFuture(d){
  const diffDays = Math.round((d - new Date(now.getFullYear(),now.getMonth(),now.getDate())) / 86400000);
  if (diffDays === 1) return "Zítra";
  if (diffDays <= 7) return `Za ${diffDays} dní`;
  return "Nadcházející";
}

function showEventDetail(idx){
  const ev = rawEvents[idx];
  if(!ev) return;
  const r = ev.raw || {};

  // Sestaví řádky detailu
  const rows = [];

  // Datum a čas
  rows.push({label:'Datum', value: fmtDateRange(ev)});
  if(!isMultiDay(ev)) rows.push({label:'Čas', value: fmtTime(ev.start, ev.end)});

  if(ev.place) rows.push({label:'Místo', value: ev.place});

  // Popis
  const desc = stripHtml(r.description);
  if(desc) rows.push({label:'Popis', value: desc});

  // Organizátor
  if(r.organizer && r.organizer.displayName) rows.push({label:'Organizátor', value: r.organizer.displayName});
  else if(r.organizer && r.organizer.email) rows.push({label:'Organizátor', value: r.organizer.email});

  // Účastníci
  if(r.attendees && r.attendees.length){
    const names = r.attendees.map(a => a.displayName || a.email).join(', ');
    rows.push({label:'Účastníci', value: names});

  // Status
  if(r.status && r.status !== 'confirmed') rows.push({label:'Stav', value: r.status});

  // Konferenční odkaz
  const confLink = r.hangoutLink || (r.conferenceData && r.conferenceData.entryPoints && r.conferenceData.entryPoints[0] && r.conferenceData.entryPoints[0].uri);
  
  const backdrop = document.createElement('div');
  backdrop.className = 'ev-modal-backdrop';
  backdrop.onclick = (e) => { if(e.target===backdrop) backdrop.remove(); };

  backdrop.innerHTML = `
    <div class="ev-modal">
      <button class="ev-modal-close" onclick="this.closest('.ev-modal-backdrop').remove()">×</button>
      <div class="ev-modal-title">${ev.title}</div>

  document.body.appendChild(backdrop);
}

function renderTimeline(){
  app.innerHTML = "";

  if (rawEvents.length === 0){
    app.innerHTML = `<div class="slot"><div class="card" style="text-align:center;"><div class="title-row">Žádné události</div></div></div>`;
    return;
  }

  centerIndex = 0;
  for (let i=0;i<rawEvents.length;i++){
    if (rawEvents[i].end >= now){ centerIndex = i; break; }
    centerIndex = i;
  }

  const orderedIndices = [];
  for (let i = rawEvents.length - 1; i > centerIndex; i--) orderedIndices.push(i); // future, furthest first (top)
  orderedIndices.push(centerIndex); // now (center)
  for (let i = centerIndex - 1; i >= 0; i--) orderedIndices.push(i); // past, nearest-past first (just below now)

  orderedIndices.forEach((i) => {
    const ev = rawEvents[i];
    const isNow = i === centerIndex;
    const isPast = i < centerIndex;
    const kind = isNow ? "now" : (isPast ? "past" : "future");

    const slot = document.createElement('div');
    slot.className = `slot ${kind}`;

    const eyebrowText = isNow ? "Teď" : (isPast ? "Skončilo" : fmtRelativeFuture(ev.start));

    slot.innerHTML = `
      <div class="card">
        <div class="eyebrow"><span class="pip"></span>${eyebrowText}</div>
        <div class="date-row">${fmtDateRange(ev)}</div>
        <div class="time-row">${fmtTimeRow(ev)}</div>
        <div class="title-row title-clickable" onclick="showEventDetail(${i})">${ev.title}</div>
        ${ev.place ? `<div class="place-row">${ev.place}</div>` : ``}
        ${isNow ? `<span class="badge">probíhá teď</span>` : ``}
        ${isPast && ev.photoAlbum ? `<a class="photo-link" href="#" onclick="event.preventDefault();checkAlbumAccess('${ev.photoAlbum.replace(/'/g,"\\'")}')">${photoSVG()}Album fotek</a>` : ``}
      </div>
    `;
    slot.dataset.idx = i;
    app.appendChild(slot);
  });

  const nowSlot = document.querySelector('.slot.now');
  if (nowSlot) nowSlot.scrollIntoView({block:"center"});
}

async function fetchGoogleCalendarEvents(){
  const statusEl = document.getElementById('calStatus');
  statusEl.textContent = 'Načítám kalendář…';
  statusEl.style.display = 'block';
  try{
    let allItems = [];
    let pageToken = null;
    const timeMin = '2000-01-01T00:00:00Z'; // všechny události od roku 2000
    do {
      let url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GOOGLE_CALENDAR_ID)}/events`
        + `?key=${GOOGLE_API_KEY}&singleEvents=true&orderBy=startTime&maxResults=2500`
        + `&timeMin=${encodeURIComponent(timeMin)}`;
      if(pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
      const res = await fetch(url);
      const data = await res.json();
      if(!res.ok){
        statusEl.textContent = `Chyba ${res.status}: ${data.error?.message || JSON.stringify(data.error)}`;
        return;
      }
      const items = (data.items||[]).filter(it => it.start&&(it.start.dateTime||it.start.date));
      allItems = allItems.concat(items);
      pageToken = data.nextPageToken || null;
    } while(pageToken);

    if(!allItems.length){ statusEl.textContent = 'Kalendář načten, ale žádné události.'; return; }

    rawEvents = allItems.map(it => {
      const start = new Date(it.start.dateTime || it.start.date+'T00:00:00');
      const end   = new Date((it.end&&(it.end.dateTime||it.end.date)) ? (it.end.dateTime||it.end.date+'T00:00:00') : start);
      let photoAlbum = null;
      if(it.attachments){
        const p = it.attachments.find(a => /photos\.google\.com|photos\.app\.goo\.gl/.test(a.fileUrl||''));
        if(p) photoAlbum = p.fileUrl;
      }
      if(!photoAlbum && it.description){
        const clean = it.description.replace(/<[^>]+>/g, ' '); // strip HTML tags from description
        const m = clean.match(/https?:\/\/photos(?:\.app)?\.goo\.gl\/[^\s"'<>]+|https?:\/\/photos\.google\.com\/[^\s"'<>]+/);
        if(m) photoAlbum = m[0].replace(/&amp;/g,'&');
      }
      const title = (it.summary||'(bez názvu)').trim();
      // Matching alba — case-insensitive, bez přebytečných mezer
      if(!photoAlbum){
        const key = Object.keys(PHOTO_ALBUMS).find(k => k.trim().toLowerCase() === title.toLowerCase());
        if(key) photoAlbum = PHOTO_ALBUMS[key];
      }
      return { start, end, title, place: it.location||'', photoAlbum, raw: it };
    }).sort((a,b)=>a.start-b.start);

    statusEl.style.display = 'none';
    renderTimeline();
    setTimeout(checkUpcomingNotifications, 1000);
  }catch(e){
    statusEl.textContent = `Síťová chyba: ${e.message}`;
  }
}

  const d = val ? new Date(val + 'T00:00:00') : new Date();
  window.open(calDayUrl(d), '_blank');
});
// Odstraň všechny staré service workery
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

// --- Notifikace 5 dní před událostí ---
// --- Upozornění na blížící se události (in-app banner) ---
function checkUpcomingNotifications(){
  const today = new Date();
  today.setHours(0,0,0,0);

  const upcoming = rawEvents.filter(ev => {
    const evDay = new Date(ev.start);
    evDay.setHours(0,0,0,0);
    const diffDays = Math.round((evDay - today) / 86400000);
    return diffDays > 0 && diffDays <= 5;
  });

  if (!upcoming.length) return;

  const todayStr = today.toISOString().slice(0,10);
  const lastShown = localStorage.getItem('notifShownDate');
  if (lastShown === todayStr) return;
  localStorage.setItem('notifShownDate', todayStr);

  upcoming.forEach((ev, idx) => {
    const evDay = new Date(ev.start);
    evDay.setHours(0,0,0,0);
    const diffDays = Math.round((evDay - today) / 86400000);
    const daysText = diffDays === 1 ? 'zítra' : `za ${diffDays} dní`;

    const backdrop = document.createElement('div');
    backdrop.className = 'ev-modal-backdrop kokr-banner';
    backdrop.onclick = (e) => { if(e.target===backdrop) backdrop.remove(); };

    const evIdx = rawEvents.indexOf(ev);

    backdrop.innerHTML = `
      <div class="ev-modal">
        <button class="ev-modal-close" onclick="this.closest('.ev-modal-backdrop').remove()">×</button>
        <div class="ev-modal-label" style="font-size:clamp(16px,5.5vw,26px);letter-spacing:0.06em;color:var(--accent);text-align:center;padding:4px 0;">Už se těšíš?</div>
        <div class="ev-modal-title">${ev.title}</div>
        <div class="ev-modal-label">Kdy</div>
        <div class="ev-modal-value">${fmtDateRange(ev)} · ${daysText}</div>
        ${ev.place ? `<div class="ev-modal-label">Místo</div><div class="ev-modal-value">${ev.place}</div>` : ''}
        <div class="ev-modal-value" style="margin-top:16px;font-size:clamp(11px,3.5vw,18px);color:var(--accent);text-transform:uppercase;letter-spacing:0.04em;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Kokršneci na tebe ano.</div>
        <button onclick="this.closest('.ev-modal-backdrop').remove()" style="
          display:block; width:100%; margin-top:16px;
          background:var(--accent); border:none;
          color:#000; font-family:'JetBrains Mono',monospace; font-size:13px;
          padding:10px; border-radius:6px; cursor:pointer; letter-spacing:0.05em; font-weight:700;
        ">OK</button>
      </div>
    `;
    document.body.appendChild(backdrop);
    setTimeout(() => { if(backdrop.parentElement) backdrop.remove(); }, 15000);
  });

  // Pokus se také o systémovou notifikaci pokud je povolena
  if ('Notification' in window && Notification.permission === 'granted'){
    upcoming.forEach(ev => {
      const evDay = new Date(ev.start);
      evDay.setHours(0,0,0,0);
      const diffDays = Math.round((evDay - today) / 86400000);
      const daysText = diffDays === 1 ? 'zítra' : `za ${diffDays} dní`;
      new Notification(`Už se těšíš?`, {
        body: `${ev.title} — ${daysText} (${fmtDate(ev.start)})\n\nKokršneci na tebe ano.`,
        icon: 'icon-192v2.png',
      });
    });
  }
}

window.addEventListener('load', () => {
  setTimeout(checkUpcomingNotifications, 2000);
});

renderTimeline();
</script>
